<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reciclaje Entel</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #002eff; }
        select, button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background-color: #002eff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #001fba; }
    </style>
</head>
<body>
    <div class="container">
        <h2>♻️ Buzón Inteligente</h2>
        <p>Selecciona el modelo del equipo que vas a reciclar:</p>
        <form action="/procesar" method="POST">
            <input type="text" name="rut" placeholder="Tu RUT (ej: 19123456-7)" required style="width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc;">
            <input type="text" name="nombre" placeholder="Tu Nombre" required style="width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc;">
            <select name="modelo" required>
                <option value="" disabled selected>Selecciona tu modelo...</option>
                <option value="iPhone 13">iPhone 13</option>
                <option value="Samsung S22">Samsung Galaxy S22</option>
                <option value="Motorola G20">Motorola G20</option>
                <option value="Otro">Otro modelo</option>
            </select>
            <button type="submit">Generar Código de Depósito</button>
        </form>
    </div>
</body>
</html>
